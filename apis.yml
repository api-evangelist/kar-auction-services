aid: kar-auction-services
name: KAR Auction Services (Historical)
description: >-
  KAR Auction Services was a leading provider of vehicle auction, vehicle
  remarketing, and salvage auction services in North America. The company
  divested its salvage business IAA in 2023 (now part of RB Global) and
  rebranded its remaining wholesale business as OPENLANE. This repository
  is retained for historical reference. For current activity see the
  OPENLANE repository.
